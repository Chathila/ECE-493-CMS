<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate Schedule</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="register-page">
<main class="register-shell">
  <h1>Conference Schedule</h1>
  <p class="register-subtitle">Generate and review conference schedule.</p>
  <button id="generate" class="register-submit">Generate Schedule</button>
  <pre id="result" class="register-feedback"></pre>
</main>
<script>
  document.getElementById('generate').addEventListener('click', async () => {
    const response = await fetch('/schedule/generate', { method: 'POST' });
    const json = await response.json().catch(() => ({}));
    document.getElementById('result').textContent = JSON.stringify(json, null, 2);
  });
</script>
</body>
</html>
