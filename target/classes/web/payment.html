<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Payment</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="register-page">
<main class="register-shell">
  <header class="register-header">
    <p class="register-kicker">UC-19</p>
    <h1 class="register-title">Pay Registration Fee</h1>
    <p class="register-subtitle">Submit payment details and immediately generate a confirmation ticket.</p>
  </header>
  <section class="register-content stack-gap">
    <div class="register-form">
      <label for="registration-type">Registration Type</label>
      <select id="registration-type">
        <option value="student">Student</option>
        <option value="author">Author</option>
        <option value="regular" selected>Regular</option>
      </select>
      <label for="payment-method">Payment Method</label>
      <select id="payment-method">
        <option value="card" selected>Card</option>
        <option value="debit">Debit</option>
      </select>
      <label for="cardholder-name">Cardholder Name</label>
      <input id="cardholder-name" type="text" value="Attendee One" placeholder="Cardholder name" />
      <label for="card-last4">Card Last 4 Digits</label>
      <input id="card-last4" type="text" value="4242" maxlength="4" placeholder="4242" />
      <label for="payment-token">Payment Token</label>
      <input id="payment-token" type="text" value="tok_demo_success" placeholder="token" />
      <button id="submit-payment" class="register-submit" type="button">Submit Payment</button>
      <button id="generate-ticket" class="register-submit secondary-action" type="button" disabled>Generate Ticket</button>
    </div>
    <p id="status" class="register-status"></p>
    <pre id="result" class="register-feedback"></pre>
    <p class="inline-nav">Back to <a href="/home?tab=conference">dashboard conference tab</a> or open <a href="/tickets/view">ticket viewer</a>.</p>
  </section>
</main>
<script>
  let lastPaymentId = '';

  async function submitPayment() {
    const type = document.getElementById('registration-type').value.trim();
    const method = document.getElementById('payment-method').value.trim();
    const cardholder = document.getElementById('cardholder-name').value.trim();
    const last4 = document.getElementById('card-last4').value.trim();
    const token = document.getElementById('payment-token').value.trim();
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const paymentDetails = {
      method: method || 'card',
      name: cardholder,
      card_last4: last4,
      token: token || 'tok_demo_success'
    };

    resultEl.textContent = 'Submitting payment...';
    statusEl.textContent = '';
    try {
      const response = await fetch('/registration/payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ registration_type: type, payment_details: paymentDetails })
      });
      const data = await response.json().catch(() => ({}));
      resultEl.textContent = JSON.stringify(data, null, 2);

      lastPaymentId = data.payment_id || '';
      document.getElementById('generate-ticket').disabled = !lastPaymentId;

      if (response.status === 200) {
        statusEl.textContent = `Payment successful. Payment ID: ${lastPaymentId}`;
        statusEl.className = 'register-status success';
      } else {
        statusEl.textContent = data.message || `Payment failed (${response.status}).`;
        statusEl.className = 'register-status error';
      }
    } catch (error) {
      resultEl.textContent = '';
      statusEl.textContent = `Request failed: ${error.message}`;
      statusEl.className = 'register-status error';
      document.getElementById('generate-ticket').disabled = true;
    }
  }

  async function generateTicket() {
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    if (!lastPaymentId) {
      statusEl.textContent = 'Submit a successful payment first.';
      statusEl.className = 'register-status error';
      return;
    }

    resultEl.textContent = `Generating ticket for payment ${lastPaymentId}...`;
    try {
      const response = await fetch(`/payments/${encodeURIComponent(lastPaymentId)}/ticket`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
      });
      const data = await response.json().catch(() => ({}));
      resultEl.textContent = JSON.stringify(data, null, 2);
      if (data.ticket_id) {
        statusEl.textContent = `Ticket ${data.ticket_id} generated. You can view it on /tickets/view.`;
        statusEl.className = response.status === 201 ? 'register-status success' : 'register-status error';
      } else {
        statusEl.textContent = data.message || `Ticket generation failed (${response.status}).`;
        statusEl.className = 'register-status error';
      }
    } catch (error) {
      resultEl.textContent = '';
      statusEl.textContent = `Ticket request failed: ${error.message}`;
      statusEl.className = 'register-status error';
    }
  }

  document.getElementById('submit-payment').addEventListener('click', submitPayment);
  document.getElementById('generate-ticket').addEventListener('click', generateTicket);
</script>
</body>
</html>
