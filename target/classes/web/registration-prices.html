<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Prices</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="register-page">
<main class="register-shell">
  <h1>Conference Registration Prices</h1>
  <button id="load" class="register-submit">View Registration Prices</button>
  <pre id="result" class="register-feedback"></pre>
</main>
<script>
  document.getElementById('load').addEventListener('click', async () => {
    const response = await fetch('/registration/prices');
    const data = await response.json().catch(() => ({}));
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  });
</script>
</body>
</html>
