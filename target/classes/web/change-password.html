<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Change Password</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="register-shell">
  <header class="register-header">
    <p class="register-kicker">Conference Management</p>
    <h1 class="register-title">Change Password</h1>
    <p class="register-subtitle">Enter your current password and choose a new one that meets CMS policy.</p>
  </header>
  <section class="register-content">
    <form id="change-password-form" class="register-form" method="post" action="/account/password">
      <label for="current-password">Current password</label>
      <input type="password" id="current-password" name="current_password" required>
      <label for="new-password">New password</label>
      <input type="password" id="new-password" name="new_password" required>
      <label for="confirm-password">Confirm new password</label>
      <input type="password" id="confirm-password" name="confirm_password" required>
      <button class="register-submit" type="submit">Change Password</button>
    </form>
    <p class="inline-nav">After a successful password change, you will be required to log in again.</p>
    <div id="status" class="register-status" aria-live="polite"></div>
  </section>
</main>
<script>
  const form = document.getElementById('change-password-form');
  const statusBox = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBox.classList.remove('error', 'success');
    statusBox.textContent = '';

    const payload = {
      current_password: document.getElementById('current-password').value,
      new_password: document.getElementById('new-password').value,
      confirm_password: document.getElementById('confirm-password').value
    };

    const response = await fetch('/account/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    if (response.status === 200) {
      statusBox.classList.add('success');
      statusBox.textContent = result.message;
      window.setTimeout(() => {
        window.location.href = '/login';
      }, 900);
      return;
    }

    statusBox.classList.add('error');
    statusBox.textContent = result.message;
  });
</script>
</body>
</html>
