<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Form</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="dashboard-page">
<main class="register-shell dashboard-shell">
  <header class="register-header">
    <p class="register-kicker">Conference Management</p>
    <h1 class="register-title">Paper Review Form</h1>
    <p id="review-form-state" class="register-subtitle">Loading review form...</p>
  </header>
  <section class="register-content">
    <article id="paper-card" class="dashboard-card" style="display:none;"></article>
    <form id="review-form" class="register-form" style="display:none;">
      <label for="score">Score</label>
      <input id="score" name="score" type="text" placeholder="e.g., 8/10">
      <label for="recommendation">Recommendation</label>
      <input id="recommendation" name="recommendation" type="text" placeholder="Accept / Reject">
      <label for="comments">Comments</label>
      <textarea id="comments" name="comments" rows="6" placeholder="Enter review comments"></textarea>
      <button class="register-submit" type="submit">Submit Review</button>
      <p id="review-submit-state" class="register-status"></p>
    </form>
    <p class="inline-nav"><a href="/home">Back to dashboard</a></p>
  </section>
</main>
<script>
  const params = new URLSearchParams(window.location.search);
  const assignmentId = params.get('assignmentId');
  const stateEl = document.getElementById('review-form-state');
  const submitStateEl = document.getElementById('review-submit-state');
  const paperCardEl = document.getElementById('paper-card');
  const formEl = document.getElementById('review-form');

  function textOrPlaceholder(value, placeholder) {
    return value && value.trim() ? value : placeholder;
  }

  async function loadReviewForm() {
    if (!assignmentId) {
      stateEl.textContent = 'Assignment id is required.';
      return;
    }
    const response = await fetch(`/assignments/${assignmentId}/review-form`, { method: 'GET' });
    const body = await response.json();
    if (response.status !== 200) {
      stateEl.textContent = body.message || 'Review form unavailable.';
      return;
    }
    stateEl.textContent = 'Review form loaded.';
    paperCardEl.style.display = 'block';
    formEl.style.display = 'grid';
    paperCardEl.innerHTML = `
      <h2 class="dashboard-title">${textOrPlaceholder(body.paper.title, '(Untitled)')}</h2>
      <p class="dashboard-text"><strong>Authors:</strong> ${textOrPlaceholder(body.paper.authors, '(Not provided)')}</p>
      <p class="dashboard-text"><strong>Abstract:</strong> ${textOrPlaceholder(body.paper.abstract, '(Not provided)')}</p>
      <a class="action-link secondary" href="${body.paper.download_url}" target="_blank" rel="noopener">Download File</a>
    `;
  }

  formEl.addEventListener('submit', async (event) => {
    event.preventDefault();
    submitStateEl.textContent = 'Submitting review...';
    submitStateEl.className = 'register-status';
    const payload = {
      responses: {
        score: document.getElementById('score').value,
        recommendation: document.getElementById('recommendation').value,
        comments: document.getElementById('comments').value
      }
    };
    const response = await fetch(`/assignments/${assignmentId}/reviews`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const body = await response.json();
    if (response.status === 201) {
      submitStateEl.textContent = 'Review submitted successfully.';
      submitStateEl.className = 'register-status success';
      return;
    }
    if (response.status === 400 && Array.isArray(body.fields) && body.fields.length > 0) {
      submitStateEl.textContent = `Please correct: ${body.fields.join(', ')}.`;
      submitStateEl.className = 'register-status error';
      return;
    }
    submitStateEl.textContent = body.message || 'Review submission failed.';
    submitStateEl.className = 'register-status error';
  });

  loadReviewForm();
</script>
</body>
</html>
