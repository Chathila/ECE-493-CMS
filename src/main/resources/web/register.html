<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Register</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="register-shell">
  <header class="register-header">
    <p class="register-kicker">Conference Management</p>
    <h1 class="register-title">Create CMS Account</h1>
    <p class="register-subtitle">Register with email and password. Your email is your login username.</p>
  </header>
  <section class="register-content">
    <form id="register-form" class="register-form" method="post" action="/register">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button class="register-submit" type="submit">Register</button>
    </form>
    <p class="inline-nav">Already registered? <a href="/login">Log in</a></p>
    <div id="status" class="register-status" aria-live="polite"></div>
  </section>
</main>
<script>
  const form = document.getElementById('register-form');
  const statusBox = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBox.classList.remove('error', 'success');
    statusBox.textContent = '';

    const payload = {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    };

    const response = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (response.status === 302) {
      statusBox.classList.add('success');
      statusBox.textContent = 'Registration successful. Redirecting to login...';
      window.location.href = '/login';
      return;
    }

    const result = await response.json();
    statusBox.classList.add('error');
    statusBox.textContent = result.message;
  });
</script>
</body>
</html>
