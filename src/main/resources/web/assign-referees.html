<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign Referees</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="register-shell">
  <header class="register-header">
    <p class="register-kicker">Conference Management</p>
    <h1 class="register-title">Assign Referees</h1>
    <p class="register-subtitle">Assign at least one referee to this paper. Reviewer workload limit is 5 papers.</p>
  </header>
  <section class="register-content">
    <form id="assign-referees-form" class="register-form" method="post">
      <label for="paper-id">Paper ID</label>
      <input type="text" id="paper-id" name="paper_id" required>

      <label for="referee-emails">Referee Emails (comma-separated)</label>
      <input type="text" id="referee-emails" name="referee_emails" required placeholder="ref1@cms.com, ref2@cms.com">

      <button class="register-submit" type="submit">Assign Referees</button>
    </form>
    <div id="status" class="register-status" aria-live="polite"></div>
  </section>
</main>
<script>
  const form = document.getElementById('assign-referees-form');
  const statusBox = document.getElementById('status');
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  const pathPaperId = pathParts.length >= 3 && pathParts[0] === 'papers' && pathParts[2] === 'referees' ? pathParts[1] : null;

  if (pathPaperId) {
    document.getElementById('paper-id').value = pathPaperId;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBox.classList.remove('error', 'success');
    statusBox.textContent = '';

    const paperId = document.getElementById('paper-id').value.trim();
    const refereeEmails = document.getElementById('referee-emails').value
      .split(',')
      .map((value) => value.trim())
      .filter((value) => value.length > 0);

    const response = await fetch(`/papers/${encodeURIComponent(paperId)}/referees/assign`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        referee_emails: refereeEmails
      })
    });

    let result = {};
    try {
      result = await response.json();
    } catch (err) {
      result = { message: 'Assignment response could not be read.' };
    }

    if (response.status === 200 || response.status === 503) {
      statusBox.classList.add('success');
      statusBox.textContent = result.warning ? `${result.message} ${result.warning}` : result.message;
      return;
    }

    statusBox.classList.add('error');
    statusBox.textContent = result.message || 'Referee assignment failed.';
  });
</script>
</body>
</html>
