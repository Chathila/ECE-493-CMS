<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Submit Paper</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="register-shell">
  <header class="register-header">
    <p class="register-kicker">Conference Management</p>
    <h1 class="register-title">Submit Paper</h1>
    <p class="register-subtitle">Upload manuscript metadata and file. Allowed formats: PDF/DOCX. Max size: 20 MB.</p>
  </header>
  <section class="register-content">
    <form id="submit-paper-form" class="register-form" method="post" action="/papers/submit">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" required>

      <label for="authors">Authors (comma-separated)</label>
      <input type="text" id="authors" name="authors" required>

      <label for="affiliations">Affiliations (comma-separated)</label>
      <input type="text" id="affiliations" name="affiliations" required>

      <label for="paper-abstract">Abstract</label>
      <textarea id="paper-abstract" name="abstract" required rows="4"></textarea>

      <label for="keywords">Keywords (comma-separated)</label>
      <input type="text" id="keywords" name="keywords" required>

      <label for="contact-details">Contact Email</label>
      <input type="email" id="contact-details" name="contact_details" required>

      <label for="manuscript-file">Manuscript File (PDF/DOCX)</label>
      <input type="file" id="manuscript-file" name="manuscript_file" required accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">

      <button class="register-submit" type="submit">Submit Paper</button>
    </form>
    <div id="status" class="register-status" aria-live="polite"></div>
  </section>
</main>
<script>
  const form = document.getElementById('submit-paper-form');
  const statusBox = document.getElementById('status');

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = String(reader.result || '');
        const base64 = result.includes(',') ? result.split(',')[1] : '';
        resolve(base64);
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBox.classList.remove('error', 'success');
    statusBox.textContent = '';

    const file = document.getElementById('manuscript-file').files[0];
    const contentBase64 = file ? await toBase64(file) : '';

    const payload = {
      title: document.getElementById('title').value,
      authors: document.getElementById('authors').value,
      affiliations: document.getElementById('affiliations').value,
      abstract: document.getElementById('paper-abstract').value,
      keywords: document.getElementById('keywords').value,
      contact_details: document.getElementById('contact-details').value,
      manuscript_file: {
        filename: file ? file.name : '',
        content_base64: contentBase64
      }
    };

    const response = await fetch('/papers/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    if (response.status === 200) {
      statusBox.classList.add('success');
      statusBox.textContent = result.message;
      const redirect = result.redirect || '/home';
      window.setTimeout(() => {
        window.location.href = redirect;
      }, 900);
      return;
    }

    statusBox.classList.add('error');
    statusBox.textContent = result.message;
  });
</script>
</body>
</html>
